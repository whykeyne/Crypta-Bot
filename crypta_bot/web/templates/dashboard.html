<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Crypta Dashboard</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="wrapper">
    <section class="hero card">
      <div>
        <div class="badge">Crypta Bot</div>
        <h1>Панель настройки</h1>
        <p>Здесь можно выбрать каналы для панелей, музыки, уровней и оставить заметку по серверу.</p>
      </div>
      <div class="side-note">Public URL: {{ public_url }}</div>
    </section>

    {% for guild in guilds %}
    <section class="card guild-card">
      <h2>Guild ID: {{ guild.guild_id }}</h2>
      <form method="post" action="/guild/{{ guild.guild_id }}" class="grid">
        <label>
          Panel Channel ID
          <input type="number" name="panel_channel_id" value="{{ guild.panel_channel_id }}">
        </label>
        <label>
          Music Channel ID
          <input type="number" name="music_channel_id" value="{{ guild.music_channel_id }}">
        </label>
        <label>
          Level Channel ID
          <input type="number" name="level_channel_id" value="{{ guild.level_channel_id }}">
        </label>
        <label>
          Voice Levels Enabled
          <select name="level_enabled">
            <option value="1" {% if guild.level_enabled %}selected{% endif %}>On</option>
            <option value="0" {% if not guild.level_enabled %}selected{% endif %}>Off</option>
          </select>
        </label>
        <label class="full">
          Dashboard Note
          <textarea name="dashboard_note" rows="4">{{ guild.dashboard_note }}</textarea>
        </label>
        <div class="full actions">
          <button type="submit">Сохранить</button>
        </div>
      </form>
    </section>
    {% endfor %}
  </main>
</body>
</html>
